openapi: 3.0.3
info:
  title: Sports Facilities API
  version: 1.0.0
  description: >
    API REST para consultar instalaciones deportivas, deportes y
    registros meteorológicos asociados.

servers:
  - url: http://localhost:3000

paths:
  /:
    get:
      summary: Check API status
      responses:
        '200':
          description: API running correctly
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sports Facilities API is running

  /installations:
    get:
      summary: Get all installations
      description: Returns a list of sports installations
      responses:
        '200':
          description: List of installations returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Installation'
    post:
      summary: Create a new installation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Installation'
      responses:
        '201':
          description: Installation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /installations/{id}:
    get:
      summary: Get installation by id
      description: Returns a sports installation by its identifier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Installation identifier
      responses:
        '200':
          description: Installation returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Installation'
        '404':
          description: Installation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Installation:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: Polideportivo Municipal
        type:
          type: string
          example: polideportivo
        city:
          type: string
          example: Madrid
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: Installation not found